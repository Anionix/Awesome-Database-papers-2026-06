name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: make check
      - run: make generate
      - run: git diff --exit-code
