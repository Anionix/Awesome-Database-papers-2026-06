name: Add paper
description: Propose a new paper or system source for the catalog.
title: "Add paper: "
labels: ["catalog"]
body:
  - type: input
    id: title
    attributes:
      label: Paper or source title
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Source URL
      description: Prefer official conference, publisher, arXiv, company research, or author pages.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Concrete repository/database impact
      description: Name the design decision, table, validation rule, benchmark, or caveat this source changes.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
